<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      width: 440px;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    img.icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 14px;
      color: #70757a;
      text-align: center;
    }

    .tagline .accent {
      color: #ff4500;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <img class="icon" src="../../assets/logo/reddirect-logo.svg" alt="">
  <div class="name">Reddirect</div>
  <div class="tagline">Subreddit subdomains <span class="accent">→</span> clean links.</div>
</body>
</html>
