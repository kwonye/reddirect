<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      width: 1400px;
      height: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 72px 80px;
      gap: 80px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .brand .wordmark {
      font-size: 24px;
      font-weight: 600;
    }

    h1 {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.15;
    }

    .sub {
      font-size: 17px;
      color: #70757a;
      line-height: 1.5;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bar { width: 100%; }
    .bar .url { font-size: 16px; }
  </style>
</head>
<body>
  <div class="left">
    <div class="brand">
      <img src="../../assets/logo/reddirect-logo.svg" alt="">
      <span class="wordmark">Reddirect</span>
    </div>
    <h1>Clean Reddit<br>links,<br>automatically.</h1>
    <p class="sub">Subreddit subdomain links redirect<br>to canonical reddit.com/r/… paths.</p>
  </div>

  <div class="right">
    <div class="bar">
      <svg class="lock" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span class="url url-before">nba.reddit.com</span>
    </div>

    <div class="arrow">↓</div>

    <div class="bar">
      <svg class="lock" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span class="url url-after">reddit.com/r/nba</span>
    </div>
  </div>
</body>
</html>
